name: Build and Upload Releases

on:
  push:
    tags:
      - '*'
jobs:
  build:
    strategy:
      matrix:
        os: ["eeems/remarkable-toolchain:latest-rmpp", "eeems/remarkable-toolchain:latest-rm2"]
        include:
          - os: "eeems/remarkable-toolchain:latest-rmpp"
            rust_arch: aarch64-unknown-linux-gnu
            linker: gcc-aarch64-linux-gnu
            artifact_name: rmstream-aarch64
            script: build-rmpp.sh
          - os: "eeems/remarkable-toolchain:latest-rm2"
            rust_arch: armv7-unknown-linux-gnueabihf
            linker: gcc-arm-linux-gnueabihf
            artifact_name: rmstream-arm32
            script: build-rm2.sh
    runs-on: ubuntu-latest

    container:
        image: ${{ matrix.os }}

    steps:
        - name: Checkout Code
          uses: actions/checkout@v3
          with:
            submodules: true

        - name: Install rcc
          run: |
            apt-get update

            apt-get install -y \
              qt6-base-dev \
              qt6-base-dev-tools \
              ${{ matrix.linker }}

        - name: Build Application
          run: |
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs > install
            sh install -y
            . "$HOME/.cargo/env"
            rustup target add ${{ matrix.rust_arch }}
            . /opt/codex/*/*/environment-setup-*
            chmod a+x ./${{ matrix.script }}
            ./${{ matrix.script }}

        - name: Copy artifacts
          run: |
            cd build
            mv ${{ matrix.artifact_name }} rmstream
            tar -czf ${{ matrix.artifact_name }}.tar.gz rmstream

        - name: Upload Build Artifact
          uses: actions/upload-artifact@v4
          with:
            name: ${{ matrix.artifact_name }}
            path: ./build

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
        - name: Download Build Artifacts
          uses: actions/download-artifact@v4
          with:
            path: ./

        - name: Create Release
          uses: actions/create-release@v1
          id: create_release_step
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          with:
            draft: false
            prerelease: false
            release_name: ${{ github.event.release.tag_name }}
            tag_name: ${{ github.ref }}

        - name: Upload Release Assets (aarch64)
          uses: actions/upload-release-asset@v1
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          with:
            upload_url: ${{ steps.create_release_step.outputs.upload_url }}
            asset_path: rmstream-aarch64/rmstream.tar.gz
            asset_name: rmstream-aarch64.tar.gz
            asset_content_type: application/octet-stream

        - name: Upload Release Assets (arm32)
          uses: actions/upload-release-asset@v1
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          with:
            upload_url: ${{ steps.create_release_step.outputs.upload_url }}
            asset_path: rmstream-arm32/rmstream-arm32.tar.gz
            asset_name: rmstream-arm32.tar.gz
            asset_content_type: application/octet-stream
